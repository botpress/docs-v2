name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check-type:
    name: Check Type
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - run: cp "${{ env.NPM_CONFIG_USERCONFIG }}" .npmrc
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::236194216641:role/actions/dab/docs
          aws-region: us-east-1
      - run: bunx dab sync
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      - run: bun run check:type
        env:
          BOTPRESS_API_TOKEN: ${{ secrets.BOTPRESS_API_TOKEN }}

  check-lint:
    name: Check Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - run: cp "${{ env.NPM_CONFIG_USERCONFIG }}" .npmrc
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:lint

  check-format:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - run: cp "${{ env.NPM_CONFIG_USERCONFIG }}" .npmrc
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:format

  check-writing:
    name: Check Writing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - run: cp "${{ env.NPM_CONFIG_USERCONFIG }}" .npmrc
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun install -g mdx2vast
      - uses: errata-ai/vale-action@v2.1.1
        with:
          version: 3.14.2
          files: src/content/docs/
          fail_on_error: true
          filter_mode: nofilter
          reporter: github-check
          vale_flags: --glob=*.{md,mdx},!**/changelog-entries/**
          token: ${{ secrets.GITHUB_TOKEN }}

  check-link:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - run: cp "${{ env.NPM_CONFIG_USERCONFIG }}" .npmrc
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:link

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check-type, check-lint, check-format, check-writing, check-link]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - run: cp "${{ env.NPM_CONFIG_USERCONFIG }}" .npmrc
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run build
        env:
          BOTPRESS_API_TOKEN: ${{ secrets.BOTPRESS_API_TOKEN }}
