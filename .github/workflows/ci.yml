name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check-type:
    name: Check Type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - uses: oven-sh/setup-bun@v2
      - run: cat .npmrc
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:type

  check-lint:
    name: Check Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:lint

  check-format:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:format

  check-writing:
    name: Check Writing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun install -g mdx2vast
      - uses: vale-cli/vale-action@v2.1.1
        with:
          files: src/content/docs/
          fail_on_error: true
          filter_mode: nofilter
          reporter: github-check
          vale_flags: --glob=*.{md,mdx},!**/changelog-entries/**
          token: ${{ secrets.GITHUB_TOKEN }}

  check-link:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run check:link

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check-type, check-lint, check-format, check-writing, check-link]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@botpress-private'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PRIVATE_NPM_TOKEN }}
      - run: bun run build
