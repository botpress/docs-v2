pre-commit:
  parallel: true
  commands:
    format:
      glob: '**/*.{ts,tsx,md,mdx,css,json,yml}'
      exclude: 'src/content/**'
      run: bunx oxfmt --check {staged_files}
    format-astro:
      glob: '**/*.astro'
      run: bun check:format:biome {staged_files}
    lint:
      glob: '**/*.{ts,tsx}'
      run: bunx oxlint {staged_files}
    vale:
      glob: '**/*.{md,mdx}'
      run: scripts/check-vale.sh {staged_files}
    link:
      run: bun check:link
